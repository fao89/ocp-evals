[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    cluster_updates: mark test as a cluster updates evaluation test

# Coverage settings
addopts =
    -v
    --strict-markers

# Ignore directories
norecursedirs =
    .git
    .claude
    venv
    eval_output
    .caches
    htmlcov
    __pycache__
    *.egg-info

# Environment variables for tests
env =
    PYTHONPATH = .
