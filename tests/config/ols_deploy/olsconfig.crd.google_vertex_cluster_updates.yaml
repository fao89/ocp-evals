apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/created-by: lightspeed-operator
    app.kubernetes.io/instance: olsconfig-sample
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: olsconfig
    app.kubernetes.io/part-of: lightspeed-operator
spec:
  llm:
    providers:
      - credentialsSecretRef:
          name: llmcreds
        models:
          - name: gemini-2.5-flash
        name: google_vertex
        type: google_vertex
        googleVertexConfig:
          projectID: "openshift-lightspeed-tests"
          location: "us-central1"
        url: https://us-central1-aiplatform.googleapis.com/
  ols:
    defaultModel: gemini-2.5-flash
    defaultProvider: google_vertex
    deployment:
      replicas: 1
    disableAuth: false
    logLevel: DEBUG
    logging_config:
      app_log_level: DEBUG
      lib_log_level: DEBUG
      uvicorn_log_level: DEBUG
    introspectionEnabled: false
    userDataCollection:
      feedbackDisabled: true
      transcriptsDisabled: true
    toolsApprovalConfig:
      approvalType: tool_annotations
      approvalTimeout: 5
    toolFilteringConfig:
      alpha: 0.8
      topK: 10
      threshold: 0.01
  mcpServers:
    - name: openshift-cluster
      url: https://kubernetes.default.svc
      headers:
        - name: Authorization
          valueFrom:
            type: kubernetes
  featureGates:
    - MCPServer
    - ToolFiltering
