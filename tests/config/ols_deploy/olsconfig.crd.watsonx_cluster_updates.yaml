apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  labels:
    app.kubernetes.io/created-by: lightspeed-operator
    app.kubernetes.io/instance: olsconfig-sample
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: olsconfig
    app.kubernetes.io/part-of: lightspeed-operator
spec:
  llm:
    providers:
      - credentialsSecretRef:
          name: llmcreds
        projectID: ad629765-c373-4731-9d69-dc701724c081
        models:
          - name: ibm/granite-4-h-small
        name: watsonx
        type: watsonx
  ols:
    defaultModel: ibm/granite-4-h-small
    defaultProvider: watsonx
    deployment:
      replicas: 1
    disableAuth: false
    logLevel: DEBUG
    logging_config:
      app_log_level: DEBUG
      lib_log_level: DEBUG
      uvicorn_log_level: DEBUG
    introspectionEnabled: false
    userDataCollection:
      feedbackDisabled: true
      transcriptsDisabled: true
    toolsApprovalConfig:
      approvalType: tool_annotations
      approvalTimeout: 5
    toolFilteringConfig:
      alpha: 0.8
      topK: 10
      threshold: 0.01
  mcpServers:
    - name: openshift-cluster
      url: https://kubernetes.default.svc
      headers:
        - name: Authorization
          valueFrom:
            type: kubernetes
  featureGates:
    - MCPServer
    - ToolFiltering
